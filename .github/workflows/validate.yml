name: Validate site

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hugo-version:
          - "0.148.0"
          - "0.164.0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3.2.0
        with:
          hugo-version: ${{ matrix.hugo-version }}
          extended: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify site
        run: python3 scripts/check_site.py
