name: Validate site

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  HUGO_VERSION: "0.164.0"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Verify site
        run: python3 scripts/check_site.py
